name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, curl, bcmath, zip, sqlite, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: |
          cp .env.example .env
          sed -i 's|DB_CONNECTION=mysql|DB_CONNECTION=sqlite|g' .env
          sed -i 's|^DB_HOST=.*||g' .env
          sed -i 's|^DB_PORT=.*||g' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=:memory:|g' .env
          sed -i 's|^DB_USERNAME=.*||g' .env
          sed -i 's|^DB_PASSWORD=.*||g' .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Create storage directories
        run: |
          mkdir -p storage/framework/{cache/data,sessions,testing,views} storage/logs bootstrap/cache
          chmod -R 775 storage bootstrap/cache

      - name: Run migrations (SQLite in-memory)
        run: php artisan migrate --force

      - name: Run seeders
        run: php artisan db:seed --force

      - name: Check routes
        run: php artisan route:list

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package.json

      - name: Install dependencies
        working-directory: client
        run: npm install --no-audit --no-fund

      - name: Build React
        working-directory: client
        run: npm run build
        env:
          CI: false
